<template>
  <hr></hr>
  <lightning-card title="StockFit Stock Details" icon-name="custom:custom63">
   <div class="slds-grid slds-wrap">
     
      <template lwc:if={sDetails}>
        
          <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
            <dl class="slds-dl_inline">         
              <dt class="slds-dl_inline__label">Company Name:</dt>
              <dd>{sDetails.name}</dd>
              <dt class="slds-dl_inline__label">Series Id:</dt>
              <dd>{sDetails.seriesId}</dd>
              <dt class="slds-dl_inline__label">Stock Type:</dt>
              <dd>{sDetails.type}</dd>
              <dt class="slds-dl_inline__label">Sector:</dt>
              <dd>{sDetails.sector}</dd>
              <dt class="slds-dl_inline__label">Industry:</dt>
              <dd>{sDetails.industry}</dd>
              <dt class="slds-dl_inline__label">Industry Group:</dt>
              <dd>{sDetails.industryGroup}</dd>
              <dt class="slds-dl_inline__label">Status:</dt>
              <dd>{sDetails.status}</dd>
              <dt class="slds-dl_inline__label">EIN:</dt>
              <dd>{sDetails.ein}</dd>
            </dl>
          </div>
          
          <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
            <template lwc:if={sDetails.symbols}>
            <h2>Symbols</h2>
              <ul>
                <template for:each={sDetails.symbols} for:item="a_symbol">
                  <li key={a_symbol}>{a_symbol}</li>
                </template>
              </ul>
            </template>
            <template lwc:if={sDetails.formerNames}>
                <h2>Former Names</h2>
                <ul>
                  <template for:each={sDetails.formerNames} for:item="formerName">
                    <li key={formerName}>{formerName}</li>
                  </template>
                </ul>
            </template>
            <template lwc:if={sDetails.priorTickers}>
                <h2>Prior Tickers</h2>
                <ul>
                    <template for:each={sDetails.priorTickers} for:item="ticket">
                        <li key={ticket.symbol}>
                          <dt> Symbol</dt>
                          <dd>{ticket.symbol}</dd>
                          <dt>Exchange</dt>
                          <dd>{ticket.exchange}</dd>
                          <dt>Seen</dt> 
                          <dd>{ticket.lastSeen}</dd>
                        </li>
                    </template>
                </ul>
            </template>
          </div>
       
      </template>
     <!-- <template lwc:if={error}>
        <c-error-panel errors={error}></c-error-panel>
      </template>-->
    </div>
  </lightning-card>
 </template>
