<template>
    <lightning-card  title="Two way data binding">
    <div class="slds-m-around_medium">
        <lightning-input type="text" label="Enter Course Name" onkeyup={changeHandler}></lightning-input>
         </div>
         <div class="slds-m-around_medium">{fullname} is a course of {title}</div>
    </lightning-card>
    <lightning-card  title="@track properties">
        <div class="slds-m-around_medium">
            <lightning-input type="text" label="Enter City Name" onkeyup={trackHandler}></lightning-input>
             </div>
             <div class="slds-m-around_medium">{address.city} is my city.</div>
        </lightning-card>
        <lightning-card  title="Getter Demo">
            <div class="slds-m-around_medium">first user is {firstUser}</div>
            <div class="slds-m-around_medium">Multiple Expression of {num1}  and {num2} is {multiples}</div>
            </lightning-card>
</template>
